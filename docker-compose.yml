version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: voice_agent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: voice_user
      POSTGRES_PASSWORD: voice_pass
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
